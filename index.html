<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatwistron</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="24" fill="#6C63FF"/>
          <path d="M12 16h24v16a4 4 0 0 1-4 4H16a4 4 0 0 1-4-4V16z" fill="white" opacity="0.9"/>
          <path d="M12 16l12 10 12-10" stroke="#6C63FF" stroke-width="2" stroke-linecap="round"/>
          <circle cx="32" cy="30" r="6" fill="#FF6584"/>
          <path d="M30 30l1.5 1.5L34 28" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>Chatwistron</h1>
      </div>
      <p class="subtitle">Chat en tiempo real</p>
      <form id="login-form">
        <input
          type="text"
          id="username-input"
          placeholder="Elige un nombre de usuario"
          maxlength="20"
          autocomplete="off"
          required
        />
        <div class="password-field">
          <input
            type="password"
            id="room-password"
            placeholder="Contraseña de sala (cifrado E2E)"
            autocomplete="off"
            required
          />
          <span class="lock-hint">🔒 Solo quien tenga esta clave puede leer los mensajes</span>
        </div>
        <button type="submit" class="btn-primary">Entrar al chat</button>
      </form>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen">
    <header class="chat-header">
      <div class="header-left">
        <div class="status-dot"></div>
        <div>
          <h2>Sala General</h2>
          <span id="online-count">0 en línea</span>
        </div>
        <span class="e2e-badge" title="Cifrado extremo a extremo activo">🔒 E2E</span>
      </div>
      <div class="header-right">
        <span id="current-user-badge"></span>
        <button id="clear-btn" title="Borrar conversación">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
        <button id="logout-btn" title="Salir">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="messages-container">
      <div id="messages-list"></div>
      <div id="typing-indicator" class="hidden">
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>
        <p id="typing-text"></p>
      </div>
    </div>

    <footer class="chat-footer">
      <form id="message-form">
        <input
          type="text"
          id="message-input"
          placeholder="Escribe un mensaje…"
          autocomplete="off"
          maxlength="500"
        />
        <button type="submit" class="btn-send" id="send-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-icon">🗑️</div>
      <h3>Borrar conversación</h3>
      <p>Se eliminarán todos los mensajes para todos los usuarios. Esta acción no se puede deshacer.</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancelar</button>
        <button class="btn-danger" id="modal-confirm">Borrar todo</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module" src="app.js"></script>
</body>
</html>
